{% extends "queueapp/base.html" %}
{% block content %}
<div class="max-w-md mx-auto mt-10 p-4 bg-white rounded-2xl shadow-md">
  <h2 class="text-xl font-semibold text-red-600 mb-4 text-center">Zmazať účet</h2>
  <p class="text-gray-700 text-center mb-6">Naozaj chcete zmazať Váš účet?</p>

  <form method="post" class="flex flex-col gap-4">
    {% csrf_token %}
    <button type="submit" class="bg-red-600 text-white py-2 px-4 rounded hover:bg-red-700 transition duration-300">
      Áno, natrvalo zmazať
    </button>
  </form>

  <div class="mt-4 text-center">
    <a href="{% url 'queueapp:home' %}" class="text-sm text-gray-500 underline hover:text-gray-700">
      Zrušiť a vrátiť sa späť
    </a>
  </div>
</div>
{% endblock %}
